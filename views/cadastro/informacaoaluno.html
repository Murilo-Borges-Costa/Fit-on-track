<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Aluno</title>
    <link rel="stylesheet" href="../../public/styles.css">
</head>
<body>
<main>
    <!-- Botão Voltar -->
    <div class="container mt-lg mb-lg">
        <img src="../../imagens/back.png" alt="Voltar" height="40" width="40" style="cursor: pointer;" />
    </div>

    <div class="text-center mt-xl mb-xl"> <h1>Cadastro do aluno</h1></div>
    <!-- Formulário -->
    <div class="container">
        <div class="form-group">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" placeholder="Digite seu nome">
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Digite seu email">
        </div>

        <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" placeholder="Digite sua senha">
        </div>

        <div class="form-group">
            <label class="form-label">Repita a Senha</label>
            <input type="password" class="form-control" placeholder="Repita sua senha">
        </div>

        <div class="form-group">
            <label class="form-label">Possui algum problema de saúde?</label>
            <input type="text" class="form-control" placeholder="Se possui, escreva qual">
        </div>

        <div class="form-group">
            <label class="form-label">Qual é o seu gênero?</label>
            <select class="form-control">
                <option>Escolha uma opção</option>
                <option value="1">Homem</option>
                <option value="2">Mulher</option>
                <option value="3">Não sei</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Qual é o seu objetivo?</label>
            <select class="form-control">
                <option>Escolha uma opção</option>
                <option value="1">Perder peso</option>
                <option value="2">Ganhar massa</option>
                <option value="3">Saúde</option>
            </select>
        </div>

        <div class="text-center mt-xl mb-xl">
            <button class="btn btn-primary btn-lg" type="button">Cadastrar</button>
        </div>
    </div>
</main>
</body>
</html>
