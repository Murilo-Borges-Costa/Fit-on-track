<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link rel="stylesheet" href="../../public/styles.css">
</head>
<body>
<main>
    <!-- Header com Logo -->
    <header class="container flex-between">
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
    </header>
    <div class="divider"></div>

    <!-- Título -->
    <div class="container text-center mt-2xl">
        <h2>Meu Perfil</h2>
    </div>

    <!-- Seção de Foto e Editar -->
    <div class="container text-center mt-xl mb-xl">
        <img
            src="../../imagens/personalsla.jpg"
            alt="Perfil"
            width="120"
            height="150"
            style="border-radius: var(--radius-md); object-fit: cover;"
        />
        <div class="flex-center gap-md mt-lg" style="justify-content: center;">
            <img src="../../imagens/edit-row.png" alt="Editar" width="30" height="30" />
            <p style="margin: 0; cursor: pointer;">Editar</p>
        </div>
    </div>

    <!-- Formulário de Informações -->
    <div class="container">
        <div class="form-group">
            <label class="form-label">Nome</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>Bruno da Silva Soares</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>brunomars@gmail.com</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Certificados</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>url.exemplo.https/sim</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Especialidade</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>Musculação</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Gênero</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>Masculino</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Número CREF</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>29383929923</p>
            </div>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item">
                <img src="../../imagens/PERSONAL.png" alt="Personal" width="40" height="40"/>
                <p>Personal</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/TREINOS.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item active">
                <img src="../../imagens/PERFIL-COLORIDO.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
</main>
</body>
</html>
