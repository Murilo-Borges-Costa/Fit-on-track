<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treinos Prontos</title>
    <link rel="stylesheet" href="../../public/styles.css" />
  </head>
  <body>
  <main>
    <!-- Header com Logo -->
    <header class="container flex-between">
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
    </header>
    <div class="divider"></div>

    <!-- Título e Botão Adicionar -->
    <div class="container mt-xl">
        <div class="flex-between">
            <h2>Meus Treinos</h2>
            <div class="flex gap-md">
                <p>Adicionar</p>
                <img src="../../imagens/add.png" alt="Adicionar" height="30" width="30" />
            </div>
        </div>
    </div>

    <!-- Grid de Treinos com Dots -->
    <div class="container mt-xl">
        <div class="grid">
            <div class="card" style="position: relative;">
                <button class="btn btn-primary btn-lg btn-block" style="margin-bottom: var(--spacing-md);">
                    Treino A
                    <img src="../../imagens/visualizar.png" alt="" height="20" width="20" />
                </button>
                <img 
                    src="../../imagens/circled-dot.png" 
                    alt="" 
                    height="24" 
                    width="24" 
                    style="position: absolute; top: var(--spacing-md); right: var(--spacing-md);" 
                />
            </div>

            <div class="card" style="position: relative;">
                <button class="btn btn-primary btn-lg btn-block" style="margin-bottom: var(--spacing-md);">
                    Treino B
                    <img src="../../imagens/visualizar.png" alt="" height="20" width="20" />
                </button>
                <img 
                    src="../../imagens/circled-dot.png" 
                    alt="" 
                    height="24" 
                    width="24" 
                    style="position: absolute; top: var(--spacing-md); right: var(--spacing-md);" 
                />
            </div>

            <div class="card" style="position: relative;">
                <button class="btn btn-primary btn-lg btn-block" style="margin-bottom: var(--spacing-md);">
                    Treino C
                    <img src="../../imagens/visualizar.png" alt="" height="20" width="20" />
                </button>
                <img 
                    src="../../imagens/circled-dot.png" 
                    alt="" 
                    height="24" 
                    width="24" 
                    style="position: absolute; top: var(--spacing-md); right: var(--spacing-md);" 
                />
            </div>
        </div>
    </div>

    <!-- Botão Anexar Treino -->
    <div class="container text-center mt-xl">
        <button class="btn btn-primary btn-lg" type="button">
            Anexar Treino
            <img src="../../imagens/document.png" alt="" height="20" width="20" />
        </button>
    </div>

    <!-- Aluno -->
    <div class="container mt-xl">
        <div class="card">
            <div class="flex gap-lg">
                <img
                    src="../../imagens/8854187dba319e1d6a6592e1daa82c44774c5cca.jpg"
                    alt="Aluno"
                    height="100"
                    width="100"
                    style="border-radius: var(--radius-md); object-fit: cover;"
                />
                <div class="flex-column" style="flex: 1;">
                    <h3 style="margin: 0;">Thiago Moreira</h3>
                    <p class="mt-0">Perder peso</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item">
                <img src="../../imagens/PERSONAL.png" alt="Alunos" width="40" height="40"/>
                <p>Alunos</p>
            </div>
            <div class="nav-item active">
                <img src="../../imagens/TREINOS-COLORIDO.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/PERFIL.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
  </main>
  </body>
</html>
