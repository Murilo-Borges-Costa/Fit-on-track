<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escolher Aluno</title>
    <link rel="stylesheet" href="../../public/styles.css" />
  </head>
  <body>
  <main>
    <!-- Header com Logo e Botão Voltar -->
    <header class="container flex-between">
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
        <img src="../../imagens/back.png" alt="Voltar" height="30" width="30" style="cursor: pointer;" />
    </header>
    <div class="divider"></div>

    <!-- Título -->
    <div class="container text-center mt-2xl">
        <h2>Escolha seu Aluno</h2>
    </div>

    <!-- Grid de Alunos -->
    <div class="container mt-xl">
        <div class="grid">
            <!-- Aluno 1 -->
            <div class="list-item" style="flex-direction: column; gap: 0; padding: 0; border: none;">
                <div class="card" style="margin-bottom: 0; width: 100%;">
                    <div class="text-center">
                        <img
                            src="../../imagens/65e4ff2263f443530a1709af5df8287d3b938d06.png"
                            alt="Aluno"
                            height="100"
                            width="100"
                            style="border-radius: var(--radius-md); object-fit: cover;"
                        />
                        <h3 class="mt-lg mb-sm">
                            Bart da Silva Soares
                            <img src="../../imagens/circled-dot.png" alt="" height="16" width="16" style="margin-left: var(--spacing-sm);" />
                        </h3>
                        <p class="mt-0">Objetivo: Definir o corpo</p>
                    </div>
                </div>
            </div>

            <!-- Aluno 2 -->
            <div class="list-item" style="flex-direction: column; gap: 0; padding: 0; border: none;">
                <div class="card" style="margin-bottom: 0; width: 100%;">
                    <div class="text-center">
                        <img
                            src="../../imagens/1624b0b8b10b5415a9eb5bdeb8f0416aa9cbee05.png"
                            alt="Aluno"
                            height="100"
                            width="100"
                            style="border-radius: var(--radius-md); object-fit: cover;"
                        />
                        <h3 class="mt-lg mb-sm">
                            Murilo Bento
                            <img src="../../imagens/circled-dot.png" alt="" height="16" width="16" style="margin-left: var(--spacing-sm);" />
                        </h3>
                        <p class="mt-0">Objetivo: Ganhar Massa</p>
                    </div>
                </div>
            </div>

            <!-- Aluno 3 -->
            <div class="list-item" style="flex-direction: column; gap: 0; padding: 0; border: none;">
                <div class="card" style="margin-bottom: 0; width: 100%;">
                    <div class="text-center">
                        <img
                            src="../../imagens/beac6a342df3709f8edfb787957dc65a7780f1a6.jpg"
                            alt="Aluno"
                            height="100"
                            width="100"
                            style="border-radius: var(--radius-md); object-fit: cover;"
                        />
                        <h3 class="mt-lg mb-sm">
                            Braian Nogueira
                            <img src="../../imagens/circled-dot.png" alt="" height="16" width="16" style="margin-left: var(--spacing-sm);" />
                        </h3>
                        <p class="mt-0">Objetivo: Emagrecer</p>
                    </div>
                </div>
            </div>

            <!-- Aluno 4 -->
            <div class="list-item" style="flex-direction: column; gap: 0; padding: 0; border: none;">
                <div class="card" style="margin-bottom: 0; width: 100%;">
                    <div class="text-center">
                        <img
                            src="../../imagens/758e9beacb3310652683c20e2eae681e90de37af.jpg"
                            alt="Aluno"
                            height="100"
                            width="100"
                            style="border-radius: var(--radius-md); object-fit: cover;"
                        />
                        <h3 class="mt-lg mb-sm">
                            Martin Ramos Lima
                            <img src="../../imagens/circled-dot.png" alt="" height="16" width="16" style="margin-left: var(--spacing-sm);" />
                        </h3>
                        <p class="mt-0">Objetivo: Emagrecer e definir</p>
                    </div>
                </div>
            </div>

            <!-- Aluno 5 -->
            <div class="list-item" style="flex-direction: column; gap: 0; padding: 0; border: none;">
                <div class="card" style="margin-bottom: 0; width: 100%;">
                    <div class="text-center">
                        <img
                            src="../../imagens/975cd61a937cd8fea5e5b6b7b8dbab7078c57d1d.jpg"
                            alt="Aluno"
                            height="100"
                            width="100"
                            style="border-radius: var(--radius-md); object-fit: cover;"
                        />
                        <h3 class="mt-lg mb-sm">
                            Bernado Zenios
                            <img src="../../imagens/circled-dot.png" alt="" height="16" width="16" style="margin-left: var(--spacing-sm);" />
                        </h3>
                        <p class="mt-0">Objetivo: Perder peso</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Botão Salvar -->
    <div class="container text-center mt-xl mb-xl">
        <button class="btn btn-primary btn-lg" type="button">Salvar</button>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item active">
                <img src="../../imagens/PERSONAL-COLORIDO.png" alt="Alunos" width="40" height="40"/>
                <p>Alunos</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/TREINOS.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/PERFIL.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
  </main>
  </body>
</html>
