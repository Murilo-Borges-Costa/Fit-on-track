<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizar Treino</title>
    <link rel="stylesheet" href="../../public/styles.css" />
  </head>
  <body>
  <main>
    <!-- Header com Logo e Voltar -->
    <header class="container flex-between">
        <button class="btn btn-secondary">
            <img src="../../imagens/back.png" alt="Voltar" height="30" width="30" />
        </button>
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
        <div style="width: 40px;"></div>
    </header>
    <div class="divider"></div>

    <!-- Título do Treino -->
    <div class="container mt-xl">
        <h2>Treino A</h2>
    </div>

    <!-- Grid de Exercícios -->
    <div class="container mt-xl mb-xl">
        <div class="grid">
            <!-- Exercício 1 -->
            <div class="card">
                <img 
                    src="../../imagens/1dotreinoaA.gif" 
                    alt="Rosca com barra" 
                    class="card-image"
                />
                <h4 style="margin: var(--spacing-sm) 0;">Rosca com barra</h4>
                <p class="text-secondary">Rep: 10-4 | Des: 5min</p>
            </div>

            <!-- Exercício 2 -->
            <div class="card">
                <img 
                    src="../../imagens/2dotreinoA.gif" 
                    alt="Rosca bíceps" 
                    class="card-image"
                />
                <h4 style="margin: var(--spacing-sm) 0;">Rosca bíceps</h4>
                <p class="text-secondary">Rep: 10-5 | Des: 4min</p>
            </div>

            <!-- Exercício 3 -->
            <div class="card">
                <img 
                    src="../../imagens/3dotreinoA.gif" 
                    alt="Flexão" 
                    class="card-image"
                />
                <h4 style="margin: var(--spacing-sm) 0;">Flexão</h4>
                <p class="text-secondary">Rep: 10-5 | Des: 6min</p>
            </div>

            <!-- Exercício 4 -->
            <div class="card">
                <img 
                    src="../../imagens/4doTreinoaA.gif" 
                    alt="Tríceps testa" 
                    class="card-image"
                />
                <h4 style="margin: var(--spacing-sm) 0;">Tríceps testa</h4>
                <p class="text-secondary">Rep: 15-2 | Des: 10min</p>
            </div>

            <!-- Exercício 5 -->
            <div class="card">
                <img 
                    src="../../imagens/5doTreinoA.gif" 
                    alt="Barra fixa" 
                    class="card-image"
                />
                <h4 style="margin: var(--spacing-sm) 0;">Barra fixa</h4>
                <p class="text-secondary">Rep: 15-3 | Des: 5min</p>
            </div>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item">
                <img src="../../imagens/PERSONAL.png" alt="Personal" width="40" height="40"/>
                <p>Personal</p>
            </div>
            <div class="nav-item active">
                <img src="../../imagens/TREINOS-COLORIDO.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/PERFIL.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
  </main>
  </body>
</html>
</body>
</html>
