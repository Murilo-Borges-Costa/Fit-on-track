<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo de Treino</title>
    <link rel="stylesheet" href="../../public/styles.css" />
  </head>
  <body>
  <main>
    <!-- Header com Logo e Botão Voltar -->
    <header class="container flex-between">
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
        <img src="../../imagens/back.png" alt="Voltar" height="30" width="30" style="cursor: pointer;" />
    </header>
    <div class="divider"></div>

    <!-- Título do Treino -->
    <div class="container text-center mt-lg">
        <h2>Treino A</h2>
    </div>

    <!-- Grid de Exercícios -->
    <div class="container mt-xl">
        <div class="grid">
            <!-- Exercício 1 -->
            <div class="card">
                <div class="text-center mb-md">
                    <img
                        src="../../imagens/1dotreinoaA.gif"
                        alt="Exercício"
                        height="100"
                        width="100"
                        style="border-radius: var(--radius-md); object-fit: cover;"
                    />
                </div>
                <div class="text-center">
                    <h3 style="margin-bottom: var(--spacing-sm);">Rosca com barra</h3>
                    <p class="text-left">
                        <strong>Rep:</strong> 10-4<br/>
                        <strong>Des:</strong> 5min
                    </p>
                </div>
            </div>

            <!-- Exercício 2 -->
            <div class="card">
                <div class="text-center mb-md">
                    <img
                        src="../../imagens/2dotreinoA.gif"
                        alt="Exercício"
                        height="100"
                        width="100"
                        style="border-radius: var(--radius-md); object-fit: cover;"
                    />
                </div>
                <div class="text-center">
                    <h3 style="margin-bottom: var(--spacing-sm);">Rosca bíceps</h3>
                    <p class="text-left">
                        <strong>Rep:</strong> 10-5<br/>
                        <strong>Des:</strong> 4min
                    </p>
                </div>
            </div>

            <!-- Exercício 3 -->
            <div class="card">
                <div class="text-center mb-md">
                    <img
                        src="../../imagens/3dotreinoA.gif"
                        alt="Exercício"
                        height="100"
                        width="100"
                        style="border-radius: var(--radius-md); object-fit: cover;"
                    />
                </div>
                <div class="text-center">
                    <h3 style="margin-bottom: var(--spacing-sm);">Flexão</h3>
                    <p class="text-left">
                        <strong>Rep:</strong> 10-5<br/>
                        <strong>Des:</strong> 6min
                    </p>
                </div>
            </div>

            <!-- Exercício 4 -->
            <div class="card">
                <div class="text-center mb-md">
                    <img
                        src="../../imagens/4doTreinoaA.gif"
                        alt="Exercício"
                        height="100"
                        width="100"
                        style="border-radius: var(--radius-md); object-fit: cover;"
                    />
                </div>
                <div class="text-center">
                    <h3 style="margin-bottom: var(--spacing-sm);">Tríceps testa</h3>
                    <p class="text-left">
                        <strong>Rep:</strong> 15-2<br/>
                        <strong>Des:</strong> 10min
                    </p>
                </div>
            </div>

            <!-- Exercício 5 -->
            <div class="card">
                <div class="text-center mb-md">
                    <img
                        src="../../imagens/5doTreinoA.gif"
                        alt="Exercício"
                        height="100"
                        width="100"
                        style="border-radius: var(--radius-md); object-fit: cover;"
                    />
                </div>
                <div class="text-center">
                    <h3 style="margin-bottom: var(--spacing-sm);">Barra fixa</h3>
                    <p class="text-left">
                        <strong>Rep:</strong> 15-3<br/>
                        <strong>Des:</strong> 5min
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item">
                <img src="../../imagens/PERSONAL.png" alt="Personal" width="40" height="40"/>
                <p>Personal</p>
            </div>
            <div class="nav-item active">
                <img src="../../imagens/TREINOS-COLORIDO.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/PERFIL.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
  </main>
  </body>
</html>
