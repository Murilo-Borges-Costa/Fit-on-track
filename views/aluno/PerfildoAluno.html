<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil do Aluno</title>
    <link rel="stylesheet" href="../../public/styles.css" />
  </head>
  <body>
  <main>
    <!-- Header com Logo -->
    <header class="container flex-between">
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
    </header>
    <div class="divider"></div>

    <!-- Título -->
    <div class="container text-center mt-2xl">
        <h2>Meu Perfil</h2>
    </div>

    <!-- Seção de Foto e Editar -->
    <div class="container text-center mt-xl mb-xl">
        <img
            src="../../imagens/PerfildoAluno.png"
            alt="Perfil"
            width="120"
            height="150"
            style="border-radius: var(--radius-md); object-fit: cover;"
        />
        <div class="flex-center gap-md mt-lg" style="justify-content: center;">
            <img src="../../imagens/edit-row.png" alt="Editar" width="30" height="30" />
            <p style="margin: 0; cursor: pointer;">Editar</p>
        </div>
    </div>

    <!-- Formulário de Informações -->
    <div class="container">
        <div class="form-group">
            <label class="form-label">Nome</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>Beatriz Borges Barreto</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>beatrizborges@gmail.com</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Altura</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>168cm</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Massa</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>85 Kg</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Problemas de Saúde</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>Não tenho problema de saúde</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Gênero</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>Feminino</p>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Objetivo</label>
            <div style="padding: var(--spacing-md); background-color: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
                <p>Perder peso e Definir</p>
            </div>
        </div>

        <div class="text-center mt-xl mb-xl">
            <button class="btn btn-primary btn-lg" type="button">
                Sair
                <img src="../../imagens/emergency-exit.png" alt="" height="20" width="20" />
            </button>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item">
                <img src="../../imagens/PERSONAL.png" alt="Personal" width="40" height="40"/>
                <p>Personal</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/TREINOS.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item active">
                <img src="../../imagens/PERFIL-COLORIDO.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
  </main>
  </body>
</html>
