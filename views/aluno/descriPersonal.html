<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seu Personal</title>
    <link rel="stylesheet" href="../../public/styles.css" />
  </head>
  <body>
  <main>
    <!-- Header com Logo -->
    <header class="container flex-between">
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
    </header>
    <div class="divider"></div>

    <!-- Título -->
    <div class="container text-center mt-2xl">
        <h2>Seu Personal</h2>
    </div>

    <!-- Informações do Personal -->
    <div class="container mt-xl">
        <div class="card">
            <div class="flex gap-lg">
                <img
                    src="../../imagens/1624b0b8b10b5415a9eb5bdeb8f0416aa9cbee05.png"
                    alt="Personal"
                    height="100"
                    width="100"
                    style="border-radius: var(--radius-md); object-fit: cover;"
                />
                <div class="flex-column" style="flex: 1;">
                    <h3 style="margin: 0;">Murillo Bezerra</h3>
                    <p class="mt-0">murilinbezero@gmail.com</p>
                </div>
            </div>
        </div>

        <!-- Avaliação -->
        <div class="card mt-lg">
            <h3 class="rsc mb-lg">Avaliação</h3>
            <div class="rsc mb-lg">
                <img
                    src="../../imagens/estrelas-classificando-5-comentarios-em-fundo-preto_601576-588.avif"
                    alt="Avaliação"
                    width="250"
                    height="80"
                    style="object-fit: contain;"
                />
            </div>
        </div>

        <!-- CREF e Especialidades -->
        <div class="card mt-lg">
            <div class="mb-lg">
                <label class="form-label">CREF</label>
                <p class="mt-0">943849-H/ES</p>
            </div>
            <div>
                <label class="form-label">Especialidades</label>
                <p class="mt-0">Musculação e treinos funcionais</p>
            </div>
        </div>

        <!-- Botão Contate-me -->
        <div class="text-center mt-xl mb-xl">
            <button class="btn btn-primary btn-lg" type="button">
                Contate-me
                <img
                    src="../../imagens/c1a6d8eeeb4c698cbc62635e2adbdcf3b6aafd29.png"
                    alt=""
                    height="30"
                    width="30"
                />
            </button>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item active">
                <img src="../../imagens/PERSONAL-COLORIDO.png" alt="Personal" width="40" height="40"/>
                <p>Personal</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/TREINOS.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/PERFIL.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
  </main>
  </body>
</html>
