<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Treinos</title>
    <link rel="stylesheet" href="../../public/styles.css">
</head>
<body>
<main>
    <!-- Header com Logo -->
    <header class="container flex-between">
        <img
            src="../../imagens/Logo academia neon verde (3).png"
            alt="Logo"
            height="50"
            width="50"
            class="logo-header"
        />
    </header>
    <div class="divider"></div>

    <!-- Título -->
    <div class="container text-center mt-2xl">
        <h2>Meus Treinos</h2>
    </div>

    <!-- Grid de Treinos -->
    <div class="container mt-xl">
        <div class="grid">
            <button class="btn btn-primary btn-lg btn-block">
                Treino A
                <img
                    src="../../imagens/visualizar.png"
                    alt=""
                    height="20"
                    width="20"
                />
            </button>

            <button class="btn btn-primary btn-lg btn-block">
                Treino B
                <img
                    src="../../imagens/visualizar.png"
                    alt=""
                    height="20"
                    width="20"
                />
            </button>

            <button class="btn btn-primary btn-lg btn-block">
                Treino C
                <img
                    src="../../imagens/visualizar.png"
                    alt=""
                    height="20"
                    width="20"
                />
            </button>
        </div>
    </div>

    <!-- Footer Navigation -->
    <div class="divider"></div>
    <nav class="nav-bottom">
        <div class="nav-icons">
            <div class="nav-item">
                <img src="../../imagens/PERSONAL.png" alt="Personal" width="40" height="40"/>
                <p>Personal</p>
            </div>
            <div class="nav-item active">
                <img src="../../imagens/TREINOS-COLORIDO.png" alt="Treinos" width="40" height="40"/>
                <p>Treinos</p>
            </div>
            <div class="nav-item">
                <img src="../../imagens/PERFIL.png" alt="Perfil" width="40" height="40"/>
                <p>Perfil</p>
            </div>
        </div>
    </nav>
</main>
</body>
</html>
